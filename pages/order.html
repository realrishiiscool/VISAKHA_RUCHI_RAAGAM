<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order Food | Ruchi Raagam</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>


    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo-container">
            <img src="../images/logo/logo.png" alt="logo">
            <h1 class="logo">Ruchi Raagam</h1>
        </div>

        <div class="menu-toggle" id="menuToggle">&#9776;</div>

        <ul class="nav-links" id="navLinks">

            <li><a href="../index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="booking.html">Table Booking</a></li>
            <li><a href="order.html">Order</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>



    <!-- ORDER TYPE -->

    <section class="menu-container">

        <h2>Choose Order Type</h2>

        <div class="menu-buttons">

            <button onclick="selectOrderType('delivery')">Home Delivery</button>
            <button onclick="selectOrderType('takeaway')">Takeaway</button>
            <button onclick="selectOrderType('dinein')">Dine-In</button>

        </div>

    </section>



    <!-- DELIVERY DETAILS -->

    <section id="deliverySection" style="display:none">

        <div style="max-width:400px;margin:auto">

            <input type="text" placeholder="Name" style="width:100%;padding:10px;margin:5px">
            <input type="text" placeholder="Phone" style="width:100%;padding:10px;margin:5px">
            <input type="text" placeholder="Address" style="width:100%;padding:10px;margin:5px">

        </div>

    </section>



    <!-- MENU -->

    <section class="menu-container">

        <h2>Select Food</h2>

        <div class="menu-buttons">

            <button onclick="loadMenu('andhra')">Andhra</button>
            <button onclick="loadMenu('hyderabadi')">Hyderabadi</button>
            <button onclick="loadMenu('chinese')">Chinese</button>
            <button onclick="loadMenu('korean')">Korean</button>
            <button onclick="loadMenu('japanese')">Japanese</button>

        </div>

        <div id="menuItems"></div>

    </section>



    <!-- CART -->

    <section class="cart">

        <h3>Your Order</h3>

        <ul id="cartItems"></ul>

        <p id="total">Total: ₹0</p>

        <button onclick="placeOrder()">Place Order</button>

    </section>



    <!-- BILL POPUP -->

    <div id="billPopup" class="popup">

        <div class="popup-box">

            <h3>Ruchi Raagam Bill</h3>

            <p id="billDetails"></p>

            <img id="qrImage">

            <br>

            <button onclick="confirmPayment()">Payment Done</button>

        </div>

    </div>



    <script>
        /* MENU DATA */

        const menuData = {

            andhra: [{
                name: "Andhra Chicken Curry",
                price: 250
            },
            {
                name: "Gongura Mutton",
                price: 320
            },
            {
                name: "Pappu Rice",
                price: 120
            },
            {
                name: "Andhra Biryani",
                price: 260
            }
            ],

            hyderabadi: [{
                name: "Hyderabadi Chicken Biryani",
                price: 280
            },
            {
                name: "Mutton Biryani",
                price: 320
            },
            {
                name: "Haleem",
                price: 200
            },
            {
                name: "Double Ka Meetha",
                price: 150
            }
            ],

            chinese: [{
                name: "Veg Manchurian",
                price: 180
            },
            {
                name: "Hakka Noodles",
                price: 170
            },
            {
                name: "Fried Rice",
                price: 160
            },
            {
                name: "Chilli Chicken",
                price: 220
            }
            ],

            korean: [{
                name: "Bibimbap",
                price: 300
            },
            {
                name: "Korean BBQ Chicken",
                price: 350
            },
            {
                name: "Kimchi Rice",
                price: 260
            }
            ],

            japanese: [{
                name: "Sushi Roll",
                price: 400
            },
            {
                name: "Ramen Bowl",
                price: 320
            },
            {
                name: "Tempura",
                price: 350
            }
            ]

        };


        let cart = {};
        let subtotal = 0;


        /* ORDER TYPE */

        function selectOrderType(type) {

            let deliverySection = document.getElementById("deliverySection");

            if (type === "delivery") {
                deliverySection.style.display = "block";
            } else if (type === "takeaway") {
                deliverySection.style.display = "none";
            } else {
                alert("Please book table for dine in");
            }

        }


        /* LOAD MENU */

        function loadMenu(type) {

            let menuDiv = document.getElementById("menuItems");

            menuDiv.innerHTML = "";

            menuData[type].forEach(item => {

                let id = item.name.replace(/\s/g, '');

                let card = document.createElement("div");

                card.className = "menu-card";

                card.innerHTML = `

<h4>${item.name}</h4>

<p>₹${item.price}</p>

<div class="counter">

<button onclick="decrease('${item.name}',${item.price})">−</button>

<span id="${id}qty">0</span>

<button onclick="increase('${item.name}',${item.price})">+</button>

</div>

`;

                menuDiv.appendChild(card);

            });

        }


        /* INCREASE */

        function increase(name, price) {

            let id = name.replace(/\s/g, '');

            if (!cart[name]) {

                cart[name] = {
                    price: price,
                    qty: 0
                };

            }

            cart[name].qty++;

            subtotal += price;

            document.getElementById(id + "qty").innerText = cart[name].qty;

            updateCart();

        }


        /* DECREASE */

        function decrease(name, price) {

            let id = name.replace(/\s/g, '');

            if (cart[name] && cart[name].qty > 0) {

                cart[name].qty--;

                subtotal -= price;

                if (cart[name].qty === 0) {
                    delete cart[name];
                }

                document.getElementById(id + "qty").innerText = cart[name] ? cart[name].qty : 0;

                updateCart();

            }

        }


        /* UPDATE CART */

        function updateCart() {

            let cartList = document.getElementById("cartItems");

            cartList.innerHTML = "";

            for (let item in cart) {

                let li = document.createElement("li");

                li.innerText = item + " x " + cart[item].qty + " = ₹" + (cart[item].qty * cart[item].price);

                cartList.appendChild(li);

            }

            document.getElementById("total").innerText = "Total: ₹" + subtotal;

        }


        /* PLACE ORDER */

        function placeOrder() {

            if (subtotal === 0) {

                alert("Cart empty");

                return;

            }

            let gst = subtotal * 0.05;

            let total = subtotal + gst;

            /* BILL */

            document.getElementById("billDetails").innerHTML =

                `Subtotal: ₹${subtotal}<br>
GST (5%): ₹${gst.toFixed(2)}<br>
<b>Total: ₹${total.toFixed(2)}</b>`;


            /* QR */

            document.getElementById("qrImage").src =

                `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Pay ₹${total} to Ruchi Raagam`;


            /* SHOW POPUP */

            document.getElementById("billPopup").style.display = "flex";

        }


        /* CONFIRM PAYMENT */

        function confirmPayment() {

            alert("Payment Successful 🎉 Order Confirmed!");

            location.reload();

        }

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>


</body>

</html>
