<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Ruchi Raagam</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>


    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo-container">
            <img src="../images/logo/logo.png" alt="logo">
            <h1 class="logo">Ruchi Raagam</h1>
        </div>

        <div class="menu-toggle" id="menuToggle">&#9776;</div>

        <ul class="nav-links" id="navLinks">

            <li><a href="../index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="booking.html">Table Booking</a></li>
            <li><a href="order.html">Order</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>



    <!-- MENU SECTION -->

    <section class="menu-container">

        <h2>Our Menu</h2>

        <div class="menu-buttons">

            <button onclick="loadMenu('andhra','andhra')">Andhra</button>
            <button onclick="loadMenu('hyderabadi','hydbir')">Hyderabadi</button>
            <button onclick="loadMenu('chinese','chi')">Chinese</button>
            <button onclick="loadMenu('korean','korea')">Korean</button>
            <button onclick="loadMenu('japanese','jap')">Japanese</button>

        </div>

        <div id="menuItems"></div>

    </section>



    <script>
        let menuData = {};


        /* LOAD MENU JSON */

        fetch("../data/menu.json")
            .then(res => res.json())
            .then(data => {

                menuData = data;
                // Load default menu
                loadMenu('andhra', 'andhra');

            });


        /* LOAD MENU */

        function loadMenu(type, folder) {

            const menuDiv = document.getElementById("menuItems");

            menuDiv.innerHTML = "";

            menuData[type].forEach((item, index) => {

                let imgNumber = index + 1;

                let card = document.createElement("div");

                card.className = "menu-card";

                card.innerHTML = `

<img src="../images/${folder}/i${imgNumber}.jpeg">

<h4>${item.name}</h4>

<p>₹${item.price}</p>

`;

                menuDiv.appendChild(card);

            });

        }

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>


</body>

</html>
